<div class="ga-page">
  <div class="ga-page-header">
    <h2>{{ 'sidebar.members' | t }}</h2>
    <div class="ga-actions">
      <input [(ngModel)]="filter" [placeholder]="'admin.search' | t" />
      <button (click)="load()">{{ 'admin.refresh' | t }}</button>
    </div>
  </div>

  <div *ngIf="loading" class="ga-note">⏳ Loading members...</div>
  <div *ngIf="error" class="ga-error">❌ {{ error }}</div>

  <div class="ga-card" *ngIf="!loading && !error">
    <div class="ga-table-wrap">
      <table class="ga-table">
        <thead>
          <tr>
            <th>{{ 'admin.name' | t }}</th>
            <th>{{ 'admin.role' | t }}</th>
            <th>{{ 'admin.actions' | t }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of filtered">
            <td class="ga-row">
              <img *ngIf="m.profileImageUrl" class="ga-avatar" [src]="m.profileImageUrl" />
              {{ m.displayName }}
            </td>
            <td>
              <span class="role" [class.admin]="m.role === 'Admin'">
                {{ m.role }}
              </span>
            </td>
            <td class="ga-btns">
              <button (click)="changeRole(m)">{{ 'admin.changeRole' | t }}</button>
              <button (click)="remove(m)">{{ 'admin.removeMember' | t }}</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="ga-note small">
      Manage group members and roles.
    </div>
  </div>
</div>
