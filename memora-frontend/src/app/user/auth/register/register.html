<div class="auth-container">
  <div class="auth-card">
    <h2>{{ 'auth.register.title' | t }} ✨</h2>

    <input
      type="email"
      [placeholder]="'auth.email' | t"
      [(ngModel)]="email"
    />

    <input
      type="password"
      [placeholder]="'auth.password' | t"
      [(ngModel)]="password"
    />

    <button (click)="register()">{{ 'auth.register.button' | t }}</button>

    <p>
      {{ 'auth.register.haveAccount' | t }}
      <a routerLink="/login">{{ 'auth.register.login' | t }}</a>
    </p>
  </div>
</div>
