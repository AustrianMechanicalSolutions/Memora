<div class="auth-container">
  <div class="auth-card">
    <h2>{{ 'auth.login.title' | t }} 👋</h2>

    <input
      type="email"
      [placeholder]="'auth.email' | t"
      [(ngModel)]="email"
    />

    <input
      type="password"
      [placeholder]="'auth.password' | t"
      [(ngModel)]="password"
    />

    <div *ngIf="show2fa">
      <label>{{ 'auth.login.twoFactor' | t }}</label>
      <input type="text" [(ngModel)]="twoFactorCode" placeholder="123456" maxlength="6" />
    </div>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button (click)="login()">{{ 'auth.login.button' | t }}</button>

    <p *ngIf="error" class="error error-inline">
      {{ error }}
    </p>

    <p>
      {{ 'auth.login.noAccount' | t }}
      <a routerLink="/register">{{ 'auth.login.register' | t }}</a>
    </p>
  </div>
</div>
